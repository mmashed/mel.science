<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <rect width="480" height="160" fill="#0B0C0C"/>

  <!-- Atom icon -->
  <g transform="translate(80 80)">
    <!-- Orbit 1 -->
    <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#EFEFEF" stroke-width="3"/>
    <!-- Orbit 2 -->
    <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#EFEFEF" stroke-width="3" transform="rotate(60)"/>
    <!-- Orbit 3 -->
    <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#EFEFEF" stroke-width="3" transform="rotate(-60)"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="7" fill="#C8FE02"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" fill="#EFEFEF">
    <text x="160" y="78" font-size="34" letter-spacing="-1">SCIENCE</text>
    <text x="160" y="116" font-size="34" letter-spacing="-1" fill="#C8FE02">KIDS<tspan fill="#C8FE02">.</tspan></text>
  </g>
</svg>
