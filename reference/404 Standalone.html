document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

*::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n\n  :root {\n    --bg: #0B0C0C;\n    --fg: #EFEFEF;\n    --accent: #C8FE02;\n    --dim: rgba(239,239,239,0.12);\n    --snap-radius: 38;\n  }\n\n  body {\n    background: var(--bg);\n    color: var(--fg);\n    font-family: 'Inter', sans-serif;\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n    user-select: none;\n  }\n\n  /* Subtle grid background */\n  body::before {\n    content: '';\n    position: fixed;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(239,239,239,0.03) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(239,239,239,0.03) 1px, transparent 1px);\n    background-size: 48px 48px;\n    pointer-events: none;\n  }\n\n  #scene {\n    position: relative;\n    width: 100vw;\n    height: 100vh;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n  }\n\n  /* Drop zone — ghost outline of solved state */\n  #drop-zone {\n    position: relative;\n    width: var(--pw);\n    height: var(--ph);\n    flex-shrink: 0;\n  }\n\n  .ghost-canvas {\n    position: absolute;\n    top: 0; left: 0;\n    pointer-events: none;\n    opacity: 0.13;\n  }\n\n  /* Puzzle pieces */\n  .piece {\n    position: fixed;\n    cursor: grab;\n    touch-action: none;\n    transition: filter 0.15s, transform 0.1s;\n    filter: drop-shadow(0 6px 24px rgba(0,0,0,0.7));\n    will-change: transform;\n    z-index: 10;\n  }\n  .piece:hover {\n    filter: drop-shadow(0 8px 28px rgba(200,254,2,0.18)) drop-shadow(0 6px 24px rgba(0,0,0,0.7));\n    transform: scale(1.02);\n  }\n  .piece.dragging {\n    cursor: grabbing;\n    z-index: 100;\n    filter: drop-shadow(0 16px 40px rgba(200,254,2,0.28)) drop-shadow(0 6px 24px rgba(0,0,0,0.9));\n    transform: scale(1.05) rotate(var(--drag-tilt));\n    transition: filter 0.1s;\n  }\n  .piece.snapped {\n    cursor: default;\n    pointer-events: none;\n    filter: none;\n    transition: left 0.35s cubic-bezier(.22,1,.36,1), top 0.35s cubic-bezier(.22,1,.36,1), filter 0.2s;\n  }\n  .piece.snap-anim {\n    filter: drop-shadow(0 0 20px rgba(200,254,2,0.7)) drop-shadow(0 0 40px rgba(200,254,2,0.3));\n  }\n\n  /* Bottom message */\n  #message {\n    position: fixed;\n    bottom: 0;\n    left: 0; right: 0;\n    padding: 36px 24px 40px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 16px;\n    background: linear-gradient(transparent, rgba(11,12,12,0.97) 40%);\n  }\n\n  #hint {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 11px;\n    font-weight: 400;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: rgba(239,239,239,0.35);\n    transition: opacity 0.6s;\n  }\n  #hint.hidden { opacity: 0; }\n\n  #msg-text {\n    font-family: 'Inter', sans-serif;\n    font-size: 15px;\n    font-weight: 400;\n    color: rgba(239,239,239,0.55);\n    letter-spacing: 0.01em;\n  }\n\n  #msg-text span {\n    color: rgba(239,239,239,0.3);\n    font-size: 12px;\n    display: block;\n    margin-top: 4px;\n    letter-spacing: 0.05em;\n    font-family: 'Unbounded', sans-serif;\n    font-weight: 400;\n  }\n\n  #catalog-link {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 13px 28px;\n    background: var(--accent);\n    color: #0B0C0C;\n    font-family: 'Unbounded', sans-serif;\n    font-size: 12px;\n    font-weight: 700;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    text-decoration: none;\n    border-radius: 2px;\n    transition: background 0.2s, transform 0.2s;\n    margin-top: 4px;\n  }\n  #catalog-link:hover {\n    background: #d8ff2a;\n    transform: translateY(-2px);\n  }\n  #catalog-link svg {\n    width: 14px; height: 14px;\n  }\n\n  /* Solved overlay */\n  #solved-msg {\n    position: fixed;\n    top: 50%;\n    left: 50%;\n    transform: translate(-50%, -50%) scale(0.85);\n    opacity: 0;\n    pointer-events: none;\n    text-align: center;\n    transition: opacity 0.5s, transform 0.5s;\n    z-index: 200;\n  }\n  #solved-msg.show {\n    opacity: 1;\n    transform: translate(-50%, -50%) scale(1);\n  }\n  #solved-msg p {\n    font-family: 'Unbounded', sans-serif;\n    font-size: 13px;\n    letter-spacing: 0.2em;\n    color: var(--accent);\n    margin-top: 8px;\n  }\n\n  /* Piece count indicator */\n  #counter {\n    position: fixed;\n    top: 28px;\n    right: 32px;\n    font-family: 'Unbounded', sans-serif;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    color: rgba(239,239,239,0.25);\n  }\n  #counter span { color: var(--accent); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"scene\">\n  <div id=\"drop-zone\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"message\">\n  <p id=\"hint\">// перетащите фрагменты, чтобы собрать<\u002Fp>\n  <p id=\"msg-text\">\n    Такой страницы не существует\n    <span>// страница не найдена<\u002Fspan>\n  <\u002Fp>\n  <a href=\"/catalog/\" id=\"catalog-link\">\n    <svg viewBox=\"0 0 14 14\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <path d=\"M1 7h12M8 3l5 4-5 4\" stroke=\"#0B0C0C\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fsvg>\n    Перейти в каталог\n  <\u002Fa>\n<\u002Fdiv>\n\n<div id=\"counter\"><span id=\"snapped-count\">0<\u002Fspan> / <span id=\"total-count\">0<\u002Fspan><\u002Fdiv>\n\n<script>\n(function() {\n  // ─── CONFIG ────────────────────────────────────────────────\n  const vw = Math.max(window.innerWidth || document.documentElement.clientWidth || 1280, 320);\n  const PW = Math.min(vw * 0.82, 640);\n  const PH = Math.round(PW * 0.42);\n  const COLS = 3, ROWS = 2;\n  const PIECE_W = PW / COLS;\n  const PIECE_H = PH / ROWS;\n  const TAB = Math.min(PIECE_W, PIECE_H) * 0.22;\n  const SNAP_R = 40;\n  const BG = '#0B0C0C';\n  const FG = '#EFEFEF';\n  const ACCENT = '#C8FE02';\n\n  // ─── EDGE TYPES: +1 tab out only, 0 flat ───────────────────\n  // All internal edges are flat (0) — no holes/cutouts on any piece\n  function getEdges(col, row) {\n    return { top: 0, bottom: 0, left: 0, right: 0 };\n  }\n\n  // ─── DRAW PUZZLE PIECE PATH ────────────────────────────────\n  function piecePath(ctx, ox, oy, w, h, edges, t) {\n    const q = 0.33, q2 = 0.67; // tab position on edge (centered)\n    ctx.beginPath();\n    ctx.moveTo(ox, oy);\n\n    // TOP (left → right)\n    if (edges.top === 0) {\n      ctx.lineTo(ox + w, oy);\n    } else {\n      const d = -edges.top;\n      ctx.lineTo(ox + w * q, oy);\n      ctx.bezierCurveTo(ox+w*q, oy+d*t*0.5, ox+w*0.42, oy+d*t, ox+w*0.5, oy+d*t);\n      ctx.bezierCurveTo(ox+w*0.58, oy+d*t, ox+w*q2, oy+d*t*0.5, ox+w*q2, oy);\n      ctx.lineTo(ox + w, oy);\n    }\n\n    // RIGHT (top → bottom)\n    if (edges.right === 0) {\n      ctx.lineTo(ox + w, oy + h);\n    } else {\n      const d = edges.right;\n      ctx.lineTo(ox + w, oy + h * q);\n      ctx.bezierCurveTo(ox+w-d*t*0.5, oy+h*q, ox+w-d*t, oy+h*0.42, ox+w-d*t, oy+h*0.5);\n      ctx.bezierCurveTo(ox+w-d*t, oy+h*0.58, ox+w-d*t*0.5, oy+h*q2, ox+w, oy+h*q2);\n      ctx.lineTo(ox + w, oy + h);\n    }\n\n    // BOTTOM (right → left)\n    if (edges.bottom === 0) {\n      ctx.lineTo(ox, oy + h);\n    } else {\n      const d = edges.bottom;\n      ctx.lineTo(ox + w * q2, oy + h);\n      ctx.bezierCurveTo(ox+w*q2, oy+h+d*t*0.5, ox+w*0.58, oy+h+d*t, ox+w*0.5, oy+h+d*t);\n      ctx.bezierCurveTo(ox+w*0.42, oy+h+d*t, ox+w*q, oy+h+d*t*0.5, ox+w*q, oy+h);\n      ctx.lineTo(ox, oy + h);\n    }\n\n    // LEFT (bottom → top)\n    if (edges.left === 0) {\n      ctx.lineTo(ox, oy);\n    } else {\n      const d = -edges.left;\n      ctx.lineTo(ox, oy + h * q2);\n      ctx.bezierCurveTo(ox+d*t*0.5, oy+h*q2, ox+d*t, oy+h*0.58, ox+d*t, oy+h*0.5);\n      ctx.bezierCurveTo(ox+d*t, oy+h*0.42, ox+d*t*0.5, oy+h*q, ox, oy+h*q);\n      ctx.lineTo(ox, oy);\n    }\n\n    ctx.closePath();\n  }\n\n  // ─── RENDER \"404\" TO OFFSCREEN CANVAS ─────────────────────\n  const src = document.createElement('canvas');\n  src.width = PW; src.height = PH;\n  const sx = src.getContext('2d');\n\n  // Fill background\n  sx.fillStyle = BG;\n  sx.fillRect(0, 0, PW, PH);\n\n  // Draw \"404\"\n  const fontSize = PH * 0.74;\n  sx.font = `900 ${fontSize}px 'Unbounded', sans-serif`;\n  sx.fillStyle = FG;\n  sx.textAlign = 'center';\n  sx.textBaseline = 'middle';\n\n  // Wait for font, then proceed\n  document.fonts.ready.then(() => {\n    sx.font = `900 ${fontSize}px 'Unbounded', sans-serif`;\n    sx.fillStyle = FG;\n    sx.textAlign = 'center';\n    sx.textBaseline = 'middle';\n\n    // Draw glow behind the 0\n    const grd = sx.createRadialGradient(PW*0.5, PH*0.5, 0, PW*0.5, PH*0.5, PW*0.35);\n    grd.addColorStop(0, 'rgba(200,254,2,0.12)');\n    grd.addColorStop(1, 'rgba(200,254,2,0)');\n    sx.fillStyle = grd;\n    sx.fillRect(0, 0, PW, PH);\n\n    sx.fillStyle = FG;\n    sx.fillText('404', PW / 2, PH / 2);\n\n    initPuzzle();\n  });\n\n  // ─── PUZZLE SETUP ─────────────────────────────────────────\n  const dropZone = document.getElementById('drop-zone');\n  dropZone.style.width = PW + 'px';\n  dropZone.style.height = PH + 'px';\n\n  // Ghost canvas (dim background)\n  const ghostCanvas = document.createElement('canvas');\n  ghostCanvas.width = PW; ghostCanvas.height = PH;\n  ghostCanvas.className = 'ghost-canvas';\n  const gx = ghostCanvas.getContext('2d');\n  dropZone.appendChild(ghostCanvas);\n\n  let pieces = [];\n  let snappedCount = 0;\n  const totalCount = COLS * ROWS;\n  document.getElementById('total-count').textContent = totalCount;\n\n  // Compute drop zone offset in viewport\n  function getDropZoneOrigin() {\n    const rect = dropZone.getBoundingClientRect();\n    return { x: rect.left, y: rect.top };\n  }\n\n  function initPuzzle() {\n    // Draw ghost (dim \"404\")\n    gx.clearRect(0, 0, PW, PH);\n    for (let row = 0; row < ROWS; row++) {\n      for (let col = 0; col < COLS; col++) {\n        const edges = getEdges(col, row);\n        const ox = col * PIECE_W;\n        const oy = row * PIECE_H;\n        gx.save();\n        piecePath(gx, ox, oy, PIECE_W, PIECE_H, edges, TAB);\n        gx.fillStyle = FG;\n        gx.fill();\n        // Draw outlines\n        gx.strokeStyle = 'rgba(200,254,2,0.4)';\n        gx.lineWidth = 1.5;\n        gx.setLineDash([4, 6]);\n        gx.stroke();\n        gx.restore();\n      }\n    }\n    // Now draw the 404 faintly on ghost\n    gx.save();\n    gx.globalAlpha = 0.06;\n    gx.drawImage(src, 0, 0);\n    gx.restore();\n\n    // Create draggable pieces\n    const viewW = window.innerWidth;\n    const viewH = window.innerHeight;\n    const dzOrigin = getDropZoneOrigin();\n\n    for (let row = 0; row < ROWS; row++) {\n      for (let col = 0; col < COLS; col++) {\n        createPiece(col, row, dzOrigin, viewW, viewH);\n      }\n    }\n  }\n\n  function createPiece(col, row, dzOrigin, viewW, viewH) {\n    const edges = getEdges(col, row);\n    const ox = col * PIECE_W;\n    const oy = row * PIECE_H;\n\n    // Bounding box: piece + possible tab overhangs\n    const bx = ox - TAB - 4;\n    const by = oy - TAB - 4;\n    const bw = PIECE_W + TAB * 2 + 8;\n    const bh = PIECE_H + TAB * 2 + 8;\n\n    const canvas = document.createElement('canvas');\n    canvas.width = bw;\n    canvas.height = bh;\n    const ctx = canvas.getContext('2d');\n\n    // Clip to piece shape (offset by TAB padding)\n    ctx.save();\n    piecePath(ctx, TAB + 4, TAB + 4, PIECE_W, PIECE_H, edges, TAB);\n    ctx.clip();\n\n    // Draw from source\n    ctx.drawImage(src, bx, by, bw, bh, 0, 0, bw, bh);\n\n    // Inner glow on edges\n    ctx.strokeStyle = 'rgba(200,254,2,0.18)';\n    ctx.lineWidth = 2;\n    ctx.stroke();\n    ctx.restore();\n\n    // Subtle border\n    ctx.save();\n    piecePath(ctx, TAB + 4, TAB + 4, PIECE_W, PIECE_H, edges, TAB);\n    ctx.strokeStyle = 'rgba(239,239,239,0.2)';\n    ctx.lineWidth = 1.5;\n    ctx.stroke();\n    ctx.restore();\n\n    // DOM element\n    const el = document.createElement('div');\n    el.className = 'piece';\n    el.style.setProperty('--drag-tilt', `${(Math.random() * 6 - 3)}deg`);\n    el.appendChild(canvas);\n    document.getElementById('scene').appendChild(el);\n\n    // Scatter randomly (avoiding dead center)\n    const margin = 60;\n    let startX, startY;\n    const zone = Math.floor(Math.random() * 4); // 4 quadrants\n    const scatter = [\n      [margin, margin, viewW * 0.35, viewH * 0.3],\n      [viewW * 0.65, margin, viewW - margin - bw, viewH * 0.3],\n      [margin, viewH * 0.65, viewW * 0.35, viewH - margin - bh],\n      [viewW * 0.65, viewH * 0.65, viewW - margin - bw, viewH - margin - bh]\n    ];\n    const [sx1, sy1, sx2, sy2] = scatter[(col * ROWS + row) % 4];\n    startX = sx1 + Math.random() * Math.max(0, sx2 - sx1 - bw);\n    startY = sy1 + Math.random() * Math.max(0, sy2 - sy1 - bh);\n\n    el.style.left = startX + 'px';\n    el.style.top = startY + 'px';\n    el.style.width = bw + 'px';\n    el.style.height = bh + 'px';\n\n    // Target position in viewport\n    function getTargetPos() {\n      const dz = getDropZoneOrigin();\n      return {\n        x: dz.x + ox - TAB - 4,\n        y: dz.y + oy - TAB - 4\n      };\n    }\n\n    // ─── DRAG ─────────────────────────────────────────────\n    let dragging = false;\n    let startMouseX, startMouseY, startElemX, startElemY;\n    let tiltDir = Math.random() > 0.5 ? 1 : -1;\n\n    function onDown(e) {\n      if (el.classList.contains('snapped')) return;\n      dragging = true;\n      el.classList.add('dragging');\n      el.style.zIndex = 100;\n      const clientX = e.touches ? e.touches[0].clientX : e.clientX;\n      const clientY = e.touches ? e.touches[0].clientY : e.clientY;\n      startMouseX = clientX;\n      startMouseY = clientY;\n      startElemX = parseFloat(el.style.left);\n      startElemY = parseFloat(el.style.top);\n      e.preventDefault();\n    }\n\n    function onMove(e) {\n      if (!dragging) return;\n      const clientX = e.touches ? e.touches[0].clientX : e.clientX;\n      const clientY = e.touches ? e.touches[0].clientY : e.clientY;\n      const dx = clientX - startMouseX;\n      const dy = clientY - startMouseY;\n      const speed = Math.sqrt(dx*dx + dy*dy) * 0.01;\n      el.style.setProperty('--drag-tilt', `${tiltDir * Math.min(speed * 3, 8)}deg`);\n      el.style.left = (startElemX + dx) + 'px';\n      el.style.top  = (startElemY + dy) + 'px';\n      e.preventDefault();\n    }\n\n    function onUp(e) {\n      if (!dragging) return;\n      dragging = false;\n      el.classList.remove('dragging');\n      el.style.setProperty('--drag-tilt', '0deg');\n\n      const target = getTargetPos();\n      const currX = parseFloat(el.style.left);\n      const currY = parseFloat(el.style.top);\n      const dist = Math.hypot(currX - target.x, currY - target.y);\n\n      if (dist < SNAP_R) {\n        // Snap!\n        el.classList.add('snapped');\n        el.style.left = target.x + 'px';\n        el.style.top = target.y + 'px';\n        el.style.zIndex = 5;\n\n        // Flash animation\n        el.classList.add('snap-anim');\n        setTimeout(() => el.classList.remove('snap-anim'), 600);\n\n        snappedCount++;\n        document.getElementById('snapped-count').textContent = snappedCount;\n\n        if (snappedCount === totalCount) onSolved();\n      }\n    }\n\n    el.addEventListener('mousedown', onDown);\n    el.addEventListener('touchstart', onDown, { passive: false });\n    window.addEventListener('mousemove', onMove);\n    window.addEventListener('touchmove', onMove, { passive: false });\n    window.addEventListener('mouseup', onUp);\n    window.addEventListener('touchend', onUp);\n\n    pieces.push({ el, col, row, edges, getTargetPos });\n  }\n\n  // ─── SOLVED ───────────────────────────────────────────────\n  function onSolved() {\n    document.getElementById('hint').classList.add('hidden');\n\n    // Brief flash on all pieces\n    pieces.forEach(p => {\n      p.el.style.filter = `drop-shadow(0 0 30px rgba(200,254,2,0.9))`;\n      setTimeout(() => p.el.style.filter = '', 800);\n    });\n\n    // Update hint\n    setTimeout(() => {\n      document.getElementById('hint').textContent = '// собрано! но страница всё равно не найдена';\n      document.getElementById('hint').classList.remove('hidden');\n    }, 900);\n  }\n\n  // ─── RESIZE ───────────────────────────────────────────────\n  // Re-scatter on resize if needed (basic)\n  window.addEventListener('resize', () => {\n    // Snap targets auto-recalc via getDropZoneOrigin\n  });\n\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
